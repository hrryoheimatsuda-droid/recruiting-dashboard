<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>松田サンプルエンジニアリング｜採用ダッシュボード</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f3f0;--surface:#fff;--border:#ddd;--muted:#888;
  --navy:#1a3a6b;
  --blue-bg:#e3f2fd;--blue-bd:#1976d2;--blue-tx:#0d47a1;
  --red-bg:#fff0f0;--red-bd:#e53935;--red-tx:#b71c1c;
  --green-bg:#e8f5e9;--green-bd:#43a047;--green-tx:#1b5e20;
  --gray-bg:#f5f5f5;--gray-bd:#bdbdbd;--gray-tx:#757575;
}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#header{background:var(--navy);color:#fff;padding:10px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0}
#header h1{font-size:15px;font-weight:700}
#status-bar{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px}
#last-updated{opacity:.75}
#dot{width:8px;height:8px;border-radius:50%;background:#4caf50;flex-shrink:0}
#dot.loading{background:#ff9800;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:flex-end;flex-shrink:0}
.tab{padding:8px 18px;font-size:12px;font-weight:600;color:var(--muted);border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;margin-bottom:-1px;background:transparent;transition:all .15s}
.tab:hover{color:var(--navy);background:var(--bg)}
.tab.active{color:var(--navy);background:var(--surface);border-color:var(--border);border-bottom-color:var(--surface)}
#btn-refresh{margin-left:auto;margin-bottom:6px;padding:4px 12px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer}
#btn-refresh:hover{opacity:.85}

#legend{background:var(--surface);border-bottom:1px solid var(--border);padding:5px 18px;display:flex;gap:12px;flex-shrink:0;flex-wrap:wrap;align-items:center;min-height:32px}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
.leg-dot{width:9px;height:9px;border-radius:2px;border:1.5px solid;flex-shrink:0}
.urg{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;border:1px solid;white-space:nowrap}
.urg-vh{background:#ffebee;color:#c62828;border-color:#ef9a9a}
.urg-h {background:#fff3e0;color:#e65100;border-color:#ffcc80}
.urg-m {background:#fffde7;color:#f57f17;border-color:#fff176}
.urg-l {background:#f5f5f5;color:#757575;border-color:#e0e0e0}

#canvas-wrap{flex:1;overflow:auto;position:relative}
#canvas{position:relative}
svg#edges{position:absolute;inset:0;pointer-events:none;overflow:visible}

.node{position:absolute;border-radius:9px;border:1.5px solid;padding:7px 9px;width:138px;text-align:center;cursor:default}
.node.has-pipeline{cursor:default}
.node-label{font-size:11px;font-weight:700;line-height:1.35;margin-bottom:2px}
.node-area{font-size:10px;opacity:.65;margin-bottom:2px}
.node-status{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600;display:inline-block;margin-bottom:2px}
.node-meta{font-size:10px;margin-top:4px;padding-top:4px;border-top:1px solid rgba(0,0,0,.09);display:flex;flex-wrap:wrap;gap:3px;justify-content:center;align-items:center}
.node-deadline{color:var(--muted);font-size:10px}

.n-hdr{background:var(--navy);border-color:#0d2d5e}
.n-hdr .node-label{color:#fff;font-size:12px}
.n-existing{background:var(--blue-bg);border-color:var(--blue-bd)}
.n-existing .node-label{color:var(--blue-tx)}
.n-recruit{background:var(--red-bg);border-color:var(--red-bd)}
.n-recruit .node-label{color:var(--red-tx)}
.n-recruit .node-status{background:#ffcdd2;color:var(--red-tx)}
.n-decided{background:var(--green-bg);border-color:var(--green-bd)}
.n-decided .node-label{color:var(--green-tx)}
.n-decided .node-status{background:#c8e6c9;color:var(--green-tx)}
.n-closed{background:var(--gray-bg);border-color:var(--gray-bd)}
.n-closed .node-label{color:var(--gray-tx)}
.n-closed .node-status{background:#e0e0e0;color:var(--gray-tx)}
.n-str-hdr{background:var(--navy);border-color:#0d2d5e}
.n-str-hdr .node-label{color:#fff;font-size:12px}
.n-str-node{background:var(--blue-bg);border-color:var(--blue-bd)}
.n-str-node .node-label{color:var(--blue-tx)}

#loading{display:flex;position:absolute;inset:0;align-items:center;justify-content:center;color:var(--muted);font-size:14px}

/* パイプラインタブ */
.period-btn{font-size:11px;padding:3px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--muted);cursor:pointer}
.period-btn:hover{background:var(--bg)}
.period-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.mlegend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.mlegend-dot{width:9px;height:9px;border-radius:2px}
#pipeline-wrap{display:none;flex:1;overflow:auto;padding:16px}
#pipeline-wrap.show{display:block}
.pos-funnel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.pos-funnel-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.funnel-grid{display:flex;gap:6px;align-items:flex-end;overflow-x:auto;padding-bottom:8px}
.phase-col{display:flex;flex-direction:column;align-items:center;min-width:78px;flex-shrink:0}
.phase-bars{display:flex;gap:4px;align-items:flex-end;height:160px}
.bar-group{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bar-stack{display:flex;flex-direction:column-reverse;width:26px;border-radius:3px 3px 0 0;overflow:hidden}
.bar-seg{width:100%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:600;min-height:14px}
.bar-total{font-size:10px;font-weight:700;color:#333;margin-bottom:2px}
.bar-label{font-size:9px;color:var(--muted);margin-top:3px}
.phase-name{font-size:10px;font-weight:600;color:#444;margin-top:6px;text-align:center;line-height:1.2}

/* ── パイプラインポップアップ ── */
#popup{
  display:none;position:fixed;z-index:1000;
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,.18);
  padding:14px 16px;width:auto;min-width:280px;max-width:460px;
  pointer-events:none;
}
#popup.show{display:block}
#popup-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.popup-note{font-size:10px;color:var(--muted);margin-bottom:6px}
.pipe-table{width:100%;border-collapse:collapse;font-size:11px}
.pipe-table th{padding:4px 8px;text-align:center;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);border-left:1px solid transparent;border-right:1px solid transparent}
.pipe-table th:first-child{text-align:left}
.pipe-table td{padding:5px 8px;text-align:center;border-bottom:1px solid #f0f0f0;border-left:1px solid transparent;border-right:1px solid transparent}
.pipe-table td:first-child{text-align:left;font-weight:600;color:#333}
.pipe-table tr:last-child td{border-bottom:none}
.pipe-table .tgt{color:var(--muted);font-weight:400}
.pipe-table .total-cell{border-left:1px solid var(--border);background:#fafafa}
.pipe-no-data{font-size:12px;color:var(--muted);text-align:center;padding:8px 0}
</style>

</head>
<body>
<div id="header">
  <h1>&#128197; 松田サンプルエンジニアリング｜採用ダッシュボード</h1>
  <div id="status-bar">
    <div id="dot" class="loading"></div>
    <span id="last-updated">読み込み中...</span>
  </div>
</div>

<div id="tabs">
  <button class="tab active" data-tab="recruit">&#128269; 採用計画</button>
  <button class="tab" data-tab="pipeline">&#128202; パイプライン</button>
  <button id="btn-refresh">&#8635; 今すぐ更新</button>
</div>

<div id="legend">
  <div id="leg-recruit" style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <span class="leg"><span class="leg-dot" style="background:var(--navy);border-color:#0d2d5e"></span>CEO/Gr</span>
    <span class="leg"><span class="leg-dot" style="background:var(--blue-bg);border-color:var(--blue-bd)"></span>既存</span>
    <span class="leg"><span class="leg-dot" style="background:var(--red-bg);border-color:var(--red-bd)"></span>募集中</span>
    <span class="leg"><span class="leg-dot" style="background:var(--green-bg);border-color:var(--green-bd)"></span>決定</span>
    <span class="leg"><span class="leg-dot" style="background:var(--gray-bg);border-color:var(--gray-bd)"></span>クローズ</span>
    <span class="leg" style="gap:4px">緊急度:
      <span class="urg urg-vh">Very High</span>
      <span class="urg urg-h">High</span>
      <span class="urg urg-m">Middle</span>
      <span class="urg urg-l">Low</span>
    </span>
  </div>
  <div id="leg-pipeline" style="display:none;gap:8px;align-items:center;flex-wrap:wrap">
    <span style="font-size:11px;color:var(--muted);margin-right:4px">表示期間:</span>
    <button class="period-btn active" data-period="total">通算のみ</button>
    <button class="period-btn" data-period="recent3">直近3ヶ月</button>
    <button class="period-btn" data-period="all">通算＋全月</button>
    <span id="month-legend" style="display:flex;gap:8px;align-items:center;margin-left:12px"></span>
  </div>
</div>

<div id="canvas-wrap">
  <div id="canvas">
    <svg id="edges"></svg>
    <div id="loading">データを読み込んでいます...</div>
  </div>
</div>
<div id="pipeline-wrap"></div>

<div id="popup">
  <div id="popup-title"></div>
  <div id="popup-body"></div>
</div>

const PIN_LEFT=[];
const NW=138,GX=18,GY=55,PAD=60;

// ── 直近3ヶ月の月リストを返す（データに存在する月のみ。なければ末尾3つでフォールバック）──
function getRecent3Months(allMonths){
  // サンプル版：実時間に依存せず、存在する月の末尾3つを返す
  const noTotal=(allMonths||[]).filter(m=>m!=='通算');
  return noTotal.slice(-3);
}

// ── パイプラインポップアップ（【変更②】集計シート=pipelineKPI を参照し、直近3ヶ月の実績/目標を表示）──
const popup=document.getElementById('popup');

function showPipeline(posName,kpi,nodeEl){
  if(!kpi||!kpi.data||!kpi.data[posName])return;
  clearTimeout(hideTimer);
  const posData=kpi.data[posName];
  const months=getRecent3Months(kpi.months||[]);

  let bodyRows='';
  HOVER_PHASES.forEach(ph=>{
    let cells='';
    let aSum=0,tSum=0,any=false;
    months.forEach(m=>{
      const d=posData[m]&&posData[m][ph];
      if(d){
        const a=(d.actual!==undefined&&d.actual!==null)?d.actual:0;
        const t=(d.target!==undefined&&d.target!==null)?d.target:0;
        aSum+=a;tSum+=t;any=true;
        cells+=`<td><strong>${a}</strong><span class="tgt">/${t}</span></td>`;
      }else{
        cells+=`<td class="tgt">—</td>`;
      }
    });
    // 直近3ヶ月を通算した数字（実績計/目標計）
    const totalCell=any
      ?`<td class="total-cell"><strong>${aSum}</strong><span class="tgt">/${tSum}</span></td>`
      :`<td class="tgt total-cell">—</td>`;
    bodyRows+=`<tr><td>${ph}</td>${cells}${totalCell}</tr>`;
  });

  const monthHeaders=months.map(m=>`<th>${m}</th>`).join('');
  const html=`<div class="popup-note">数値は 実績/目標</div><table class="pipe-table"><thead><tr><th>フェーズ</th>${monthHeaders}<th class="total-cell">3ヶ月計</th></tr></thead><tbody>${bodyRows}</tbody></table>`;

  document.getElementById('popup-title').textContent=posName;
  document.getElementById('popup-body').innerHTML=html;

  popup.classList.add('show');

  // 位置計算（カード右側、画面端で左に反転）
  const rect=nodeEl.getBoundingClientRect();
  const pw=popup.offsetWidth||340;
  const ph=popup.offsetHeight||180;
  let left=rect.right+10;
  let top=rect.top;
  if(left+pw>window.innerWidth-10)left=rect.left-pw-10;
  if(top+ph>window.innerHeight-10)top=window.innerHeight-ph-10;
  popup.style.left=Math.max(10,left)+'px';
  popup.style.top=Math.max(10,top)+'px';
}

function hidePipeline(){
  hideTimer=setTimeout(()=>popup.classList.remove('show'),150);
}

// ── ノード構築 ──
function buildRecruitNodes(data){
  const nodes=[...FIXED_HDRS];
  const idSet=new Set(FIXED_HDRS.map(n=>n.id));
  (data.members||[]).forEach(m=>{
    const id=m.role||m.name;
    nodes.push({id,name:id,area:m.area,type:'existing',parent:m.parent||null});
    idSet.add(id);
  });
  (data.positions||[]).forEach(p=>{
    nodes.push({id:p.name,name:p.name,area:p.area,type:'pos',
      status:p.status,parent:p.parent||null,urgency:p.urgency,deadline:p.deadline});
    idSet.add(p.name);
  });
  return nodes.map(n=>({...n,parent:(n.parent&&idSet.has(n.parent))?n.parent:null}));
}


// ── レイアウト ──
// leftAlign=true: 子ノードはサブツリー左端に置く（左寄せ）。ただしCEOは子の中央に再配置。
// pinLeft: 兄弟の中で先頭（左端）に固定したいノードidの配列
function layout(nodes,leftAlign,pinLeft){
  const typeById={};
  nodes.forEach(n=>{typeById[n.id]=n.type;});
  const isHeader=id=>{const t=typeById[id];return t==='hdr'||t==='str-hdr';};
  // 子の並び順: ①pinLeftを最優先で左 ②ヘッダー(Gr)より通常ポジションを先（=CEO直下ポジションをGrの左へ） ③同ランクは元の順序維持
  function childOrder(arr){
    return arr.map((id,i)=>({id,i})).sort((a,b)=>{
      const pa=pinLeft?pinLeft.indexOf(a.id):-1, pb=pinLeft?pinLeft.indexOf(b.id):-1;
      const ra=pa>=0?pa:(isHeader(a.id)?2000:1000);
      const rb=pb>=0?pb:(isHeader(b.id)?2000:1000);
      return ra!==rb?ra-rb:a.i-b.i;
    }).map(o=>o.id);
  }
  const ch={};
  nodes.forEach(n=>{
    if(!ch[n.id])ch[n.id]=[];
    if(n.parent){if(!ch[n.parent])ch[n.parent]=[];ch[n.parent].push(n.id);}
  });
  Object.keys(ch).forEach(k=>{ch[k]=childOrder(ch[k]);});
  const swC={};
  function sw(id){
    if(swC[id]!==undefined)return swC[id];
    const c=ch[id]||[];
    return swC[id]=Math.max(NW,c.length===0?NW:c.reduce((s,x)=>s+sw(x),0)+(c.length-1)*GX);
  }
  nodes.forEach(n=>sw(n.id));
  const dep={};const vis=new Set();
  let roots=nodes.filter(n=>!n.parent).map(n=>n.id);
  const q=roots.map(id=>({id,d:0}));
  roots.forEach(id=>{dep[id]=0;vis.add(id);});
  while(q.length){const{id,d}=q.shift();(ch[id]||[]).forEach(c=>{if(!vis.has(c)){vis.add(c);dep[c]=d+1;q.push({id:c,d:d+1});}});}
  nodes.forEach(n=>{if(dep[n.id]===undefined)dep[n.id]=0;});
  const pos={};
  function place(id,lx){
    pos[id]={x:leftAlign?lx:lx+(sw(id)-NW)/2,y:dep[id]*(80+GY)+PAD};
    let cx=lx;(ch[id]||[]).forEach(c=>{place(c,cx);cx+=sw(c)+GX;});
  }
  let rx=PAD;roots.forEach(r=>{place(r,rx);rx+=sw(r)+GX;});
  nodes.forEach(n=>{if(!pos[n.id]){pos[n.id]={x:rx,y:PAD};rx+=NW+GX;}});
  // CEOだけは子ノードの中央（ど真ん中）に再配置
  if(leftAlign&&pos['CEO']&&(ch['CEO']||[]).length){
    const xs=ch['CEO'].map(c=>pos[c]&&pos[c].x).filter(v=>v!==undefined);
    if(xs.length)pos['CEO'].x=(Math.min(...xs)+Math.max(...xs))/2;
  }
  return pos;
}

// ── 描画 ──
function render(nodes,kpi,leftAlign,pinLeft){
  const pos=layout(nodes,leftAlign,pinLeft);
  document.querySelectorAll('.node').forEach(e=>e.remove());
  document.getElementById('edges').innerHTML='';
  document.getElementById('loading').style.display='none';
  popup.classList.remove('show');
  const els={};

  nodes.forEach(n=>{
    const p=pos[n.id];if(!p)return;
    const el=document.createElement('div');
    el.className='node';

    if(n.type==='hdr'){
      el.classList.add('n-hdr');
      el.innerHTML=`<div class="node-label">${n.name}</div>`;
    } else if(n.type==='str-hdr'){
      el.classList.add('n-str-hdr');
      el.innerHTML=`<div class="node-label">${n.name}</div>`;
    } else if(n.type==='str-node'){
      el.classList.add('n-str-node');
      el.innerHTML=`<div class="node-label">${n.name}</div>${n.area?`<div class="node-area">${n.area}</div>`:''}`;
    } else if(n.type==='existing'){
      el.classList.add('n-existing');
      el.innerHTML=`<div class="node-label">${n.name}</div>${n.area?`<div class="node-area">${n.area}</div>`:''}`;
    } else {
      el.classList.add(recruitNodeClass(n.status));
      let meta='';
      if(showMeta(n.status)){
        const uc=urgClass(n.urgency);
        const urgHtml=n.urgency?`<span class="urg ${uc}">${n.urgency}</span>`:'';
        const dlHtml=n.deadline?`<span class="node-deadline">⏰${n.deadline}</span>`:'';
        if(urgHtml||dlHtml)meta=`<div class="node-meta">${urgHtml}${dlHtml}</div>`;
      }
      el.innerHTML=`<div class="node-label">${n.name}</div>${n.area?`<div class="node-area">${n.area}</div>`:''}<span class="node-status">${statusLabel(n.status)}</span>${meta}`;

      // ホバーでパイプライン表示（直近3ヶ月の実績/目標）
      if(kpi&&kpi.data&&kpi.data[n.name]){
        el.classList.add('has-pipeline');
        el.addEventListener('mouseenter',()=>showPipeline(n.name,kpi,el));
        el.addEventListener('mouseleave',hidePipeline);
      }
    }
    el.style.left=p.x+'px';el.style.top=p.y+'px';
    document.getElementById('canvas').appendChild(el);
    els[n.id]={el,p};
  });

  requestAnimationFrame(()=>{
    const svg=document.getElementById('edges');
    nodes.forEach(n=>{
      if(!n.parent||!els[n.id]||!els[n.parent])return;
      const pp=els[n.parent].p,cp=els[n.id].p;
      const ph=els[n.parent].el.offsetHeight;
      const x1=pp.x+NW/2,y1=pp.y+ph,x2=cp.x+NW/2,y2=cp.y,my=(y1+y2)/2;
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
      path.setAttribute('stroke','#b0b5ae');path.setAttribute('stroke-width','1.5');path.setAttribute('fill','none');
      svg.appendChild(path);
    });
    const maxX=Math.max(...Object.values(pos).map(p=>p.x))+NW+PAD;
    const maxY=Math.max(...Object.values(pos).map(p=>p.y))+120+PAD;
    const cv=document.getElementById('canvas');
    cv.style.width=maxX+'px';cv.style.height=maxY+'px';
    svg.setAttribute('width',maxX);svg.setAttribute('height',maxY);
  });
}

function renderTab(data){
  // ホバー用に pipelineKPI を渡す。採用計画タブは左寄せ（CEO直下を一番左に）
  const kpi=data.pipelineKPI||{months:[],data:{}};
  render(buildRecruitNodes(data),kpi,true,PIN_LEFT);
}

let currentPeriod='total';

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.getElementById('leg-recruit').style.display  =tab==='recruit'?'flex':'none';
  document.getElementById('leg-pipeline').style.display =tab==='pipeline'?'flex':'none';
  // 表示エリアの切り替え
  const canvasWrap=document.getElementById('canvas-wrap');
  const pipeWrap=document.getElementById('pipeline-wrap');
  if(tab==='pipeline'){
    canvasWrap.style.display='none';
    pipeWrap.classList.add('show');
    if(cachedData)renderPipeline(cachedData);
  } else {
    canvasWrap.style.display='block';
    pipeWrap.classList.remove('show');
    if(cachedData)renderTab(cachedData);
  }
}

// ── パイプライン描画 ──
const PHASE_ORDER=['応募','書類','一次設定','一次実施','一次合格','二次設定','二次実施','二次合格','最終設定','最終実施','内定','内定承諾'];

function getVisibleMonths(allMonths){
  if(currentPeriod==='total') return ['通算'];
  if(currentPeriod==='recent3') return getRecent3Months(allMonths);
  return allMonths;
}

// パイプラインの表示順を採用計画（=KPI入力A列）の並びに準拠させる
function getOrderedPositions(data){
  const kpi=data.pipelineKPI||{data:{}};
  const ordered=[];
  const seen=new Set();
  (data.positions||[]).forEach(p=>{
    const nm=p.name;
    if(nm&&kpi.data[nm]&&!seen.has(nm)){ordered.push(nm);seen.add(nm);}
  });
  // 採用計画に見つからない（孤立した）ポジションは末尾に
  Object.keys(kpi.data).forEach(k=>{if(!seen.has(k)){ordered.push(k);seen.add(k);}});
  return ordered;
}

function renderPipeline(data){
  const kpi=data.pipelineKPI;
  const wrap=document.getElementById('pipeline-wrap');
  if(!kpi||!kpi.data||Object.keys(kpi.data).length===0){
    wrap.innerHTML='<p style="color:var(--muted);font-size:13px">集計シートのデータが取得できませんでした。</p>';
    return;
  }

  const visMonths=getVisibleMonths(kpi.months);

  // 月の色凡例
  const mleg=document.getElementById('month-legend');
  mleg.innerHTML=visMonths.map((m,i)=>
    `<span class="mlegend-item"><span class="mlegend-dot" style="background:${MONTH_COLORS[i%MONTH_COLORS.length]}"></span>${m}</span>`
  ).join('');

  // 各ポジションのファネルを描画（採用計画＝KPI入力A列の順）
  let html='';
  getOrderedPositions(data).forEach(pos=>{
    const posData=kpi.data[pos];
    if(!posData) return;
    // このポジションに表示月のデータがあるか
    const hasData=visMonths.some(m=>posData[m]);
    if(!hasData) return;

    // 全フェーズ・全月の最大値（バーの高さ正規化用）
    let maxVal=1;
    PHASE_ORDER.forEach(ph=>{
      visMonths.forEach(m=>{
        const d=posData[m]&&posData[m][ph];
        if(d){
          maxVal=Math.max(maxVal,d.target||0,d.actual||0);
        }
      });
    });

    let cols='';
    PHASE_ORDER.forEach(ph=>{
      // 目標バー（積み上げ）と実績バー（積み上げ）
      let targetSegs='',actualSegs='';
      let targetTotal=0,actualTotal=0;
      visMonths.forEach((m,mi)=>{
        const d=posData[m]&&posData[m][ph];
        if(!d)return;
        const color=MONTH_COLORS[mi%MONTH_COLORS.length];
        const tH=Math.round((d.target/maxVal)*160);
        const aH=Math.round((d.actual/maxVal)*160);
        if(d.target>0){
          targetSegs+=`<div class="bar-seg" style="height:${tH}px;background:${color}">${d.target}</div>`;
          targetTotal+=d.target;
        }
        if(d.actual>0){
          actualSegs+=`<div class="bar-seg" style="height:${aH}px;background:${color}">${d.actual}</div>`;
          actualTotal+=d.actual;
        }
      });

      cols+=`<div class="phase-col">
        <div class="phase-bars">
          <div class="bar-group">
            <div class="bar-total">${targetTotal||''}</div>
            <div class="bar-stack">${targetSegs}</div>
            <div class="bar-label">目標</div>
          </div>
          <div class="bar-group">
            <div class="bar-total">${actualTotal||''}</div>
            <div class="bar-stack">${actualSegs}</div>
            <div class="bar-label">実績</div>
          </div>
        </div>
        <div class="phase-name">${ph}</div>
      </div>`;
    });

    html+=`<div class="pos-funnel">
      <div class="pos-funnel-title">${pos}</div>
      <div class="funnel-grid">${cols}</div>
    </div>`;
  });

  wrap.innerHTML=html||'<p style="color:var(--muted);font-size:13px">表示できるデータがありません。</p>';
}

function setPeriod(period){
  currentPeriod=period;
  document.querySelectorAll('.period-btn').forEach(b=>b.classList.toggle('active',b.dataset.period===period));
  if(cachedData)renderPipeline(cachedData);
}

const dot=document.getElementById('dot'),lu=document.getElementById('last-updated');
// サンプル版：GASのサーバー呼び出しの代わりに、埋め込んだダミーデータを返す
function getData(){ return SAMPLE_DATA; }
function fetchAndRender(){
  dot.classList.add('loading');
  const data=getData();
  cachedData=data;
  if(currentTab==='pipeline')renderPipeline(data);
  else renderTab(data);
  const n=new Date();
  lu.textContent=`最終更新: ${n.getHours()}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
  dot.classList.remove('loading');dot.style.background='#4caf50';
}
document.getElementById('btn-refresh').addEventListener('click',fetchAndRender);
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));
document.querySelectorAll('.period-btn').forEach(b=>b.addEventListener('click',()=>setPeriod(b.dataset.period)));
fetchAndRender();
</script>
